sonar.projectKey=jgean09_sistema-administrativo-cec
sonar.organization=jgean09
sonar.projectName=Sistema Administrativo CEC

# Código fonte: APENAS o que você escreveu
sonar.sources=backend/src,frontend/src
# EXCLUSÕES FORTES: Ignora tudo que não é o código que você escreve
sonar.exclusions=**/node_modules/**,**/build/**,**/dist/**,**/coverage/**,**/*.test.js,**/*.spec.js,backend/coverage/**

# Testes
sonar.tests=backend/src,frontend/src
sonar.test.inclusions=**/*.test.js,**/*.spec.js

# Cobertura: O Sonar lê o arquivo .info, não precisa analisar o HTML do relatório
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/lcov.info

sonar.sourceEncoding=UTF-8

# ============================================
# IGNORAR REGRAS PARA CONTEXTO ACADÊMICO
# ============================================

# Desabilitar regras específicas (Mantive sua lista)
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7,e8,e9,e10

sonar.issue.ignore.multicriteria.e1.ruleKey=javascript:S7724
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.js
