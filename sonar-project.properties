sonar.projectKey=jgean09_sistema-administrativo-cec
sonar.organization=jgean09
sonar.projectName=Sistema Administrativo CEC

# Código fonte
sonar.sources=backend/src,frontend/src
sonar.exclusions=**/node_modules/**,**/build/**,**/dist/**,**/coverage/**,**/*.test.js,**/*.spec.js

# Testes
sonar.tests=backend/src,frontend/src
sonar.test.inclusions=**/*.test.js,**/*.spec.js

# Cobertura
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/lcov.info

sonar.sourceEncoding=UTF-8

# ============================================
# IGNORAR REGRAS PARA CONTEXTO ACADÊMICO
# ============================================

# Desabilitar regras específicas
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7,e8,e9,e10

# ESLint disable comments sem especificar regras (S7724)
sonar.issue.ignore.multicriteria.e1.ruleKey=javascript:S7724
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.js

# Duplicação de código (tolerância maior para CRUD controllers similares)
sonar.issue.ignore.multicriteria.e2.ruleKey=javascript:S1117
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.js

# Comentários TODO (não necessário para projeto acadêmico)
sonar.issue.ignore.multicriteria.e3.ruleKey=javascript:S1135
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*.js

# Console.log (debug aceitável em ambiente acadêmico)
sonar.issue.ignore.multicriteria.e4.ruleKey=javascript:S2228
sonar.issue.ignore.multicriteria.e4.resourceKey=**/*.js

# Complexidade cognitiva alta (aceitável em alguns métodos)
sonar.issue.ignore.multicriteria.e5.ruleKey=javascript:S3776
sonar.issue.ignore.multicriteria.e5.resourceKey=**/*.js

# Muitos parâmetros em funções
sonar.issue.ignore.multicriteria.e6.ruleKey=javascript:S107
sonar.issue.ignore.multicriteria.e6.resourceKey=**/*.js

# Nomes de variáveis muito curtos (ex: req, res, cb, db)
sonar.issue.ignore.multicriteria.e7.ruleKey=javascript:S119
sonar.issue.ignore.multicriteria.e7.resourceKey=**/*.js

# Declarações if aninhadas (aceitável em validações)
sonar.issue.ignore.multicriteria.e8.ruleKey=javascript:S134
sonar.issue.ignore.multicriteria.e8.resourceKey=**/*.js

# Ausência de ponto e vírgula (preferência de estilo)
sonar.issue.ignore.multicriteria.e9.ruleKey=javascript:S1438
sonar.issue.ignore.multicriteria.e9.resourceKey=**/*.js

# Funções com muitas linhas
sonar.issue.ignore.multicriteria.e10.ruleKey=javascript:S138
sonar.issue.ignore.multicriteria.e10.resourceKey=**/*.js

# ============================================
# AJUSTES DE MÉTRICAS
# ============================================

# Desabilitar análise de duplicação (CRUD controllers naturalmente terão código similar)
sonar.cpd.exclusions=**/*.js

# Tolerância maior para duplicações
sonar.duplications.exclusions=**/controllers/**,**/services/**,**/routes/**,**/middlewares/**

# Excluir arquivos de configuração da análise
sonar.coverage.exclusions=**/config/**,**/*.test.js,**/*.spec.js