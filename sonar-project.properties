# AJUSTES DE MÉTRICAS E EXCLUSÕES
# ============================================

# A duplicação é ignorada para facilitar o aprendizado
sonar.cpd.exclusions=**/*.js

# Excluir pastas sensíveis à análise de qualidade
sonar.coverage.exclusions=**/config/**,**/*.test.js,**/*.spec.js,**/coverage/**,**/lcov-report/**